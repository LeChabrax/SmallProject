    category: "order_confirmed_send_code"
    mode: "verbatim"
    needs_signature: true
    variables: [CODE]
    critical_rule: "DOIT inclure : code cumulable avec toutes les autres reductions"
    obsolete_mentions:
      - "shaker offert des 59 EUR"
      - "-15% sur leur premiere commande (le code marche sur TOUTES les commandes)"
      - "cumulable avec les reductions sur l'expedition"
      - "livraison gratuite des 69 EUR"
    body: |
      La commande est validee et sera expediee tres prochainement !

      Je t'ai cree un code affilie perso ({CODE}) qui permettra a ta communaute de beneficier de -15% sur tout le site (sans minimum d'achat). Le code est cumulable avec toutes les autres reductions sur les produits.

