  # ---------------------------------------------------------------------------
  # S13 — FAQ (pick_from_list)
  # ---------------------------------------------------------------------------
  s13_faq:
    id: "s13"
    section: "13"
    name: "FAQ - Reponses types"
    category: "faq"
    mode: "pick_from_list"
    needs_signature: false
    variables: [N]
    note: "Matcher les triggers, utiliser le body exact. [N] = nombre a remplir."
    entries:
      comment_utiliser_credit:
        triggers: ["utiliser mon credit", "mes credits", "comment utiliser"]
        body: "Tu m'envoies un message avec ce que tu veux commander, et je te fais un code du montant correspondant. Sinon on peut prevoir un call si tu preferes !"
      combien_utilisations_code:
        triggers: ["combien de personnes", "utilise mon code", "stats du code"]
        body: "[N] utilisation(s) de ton code, bien joue !!"
      code_ne_marche_pas:
        triggers: ["code ne marche pas", "lien ne marche", "ne fonctionne pas"]
        body: "Je check ca tout de suite ! [verifier et corriger, puis] C'est regle, tu peux reessayer !"
      depasser_budget:
