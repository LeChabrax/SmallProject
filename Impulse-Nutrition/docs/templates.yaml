      liberte_contenu:
        triggers: ["libre sur le contenu", "quel format", "quoi poster"]
        body: "Oui totalement ! Le format est libre, c'est toi qui geres selon ce qui colle le mieux a ta facon de communiquer. L'essentiel c'est de glisser ton code et ton lien pour que tes abonnes puissent en profiter !"
      duree_partenariat:
        triggers: ["ponctuel ou long terme", "combien de temps", "duree"]
        body: "L'idee c'est vraiment de bosser sur le long terme ! On commence par un envoi de produits, si les produits te plaisent on te cree un code affilie, et a chaque commande passee avec ton code tu recois 20€ de credit chez nous. Et si la collab fonctionne vraiment bien, on peut envisager d'aller plus loin ensemble."
      affiliatly_connexion:
        triggers: ["affiliatly", "connexion", "me connecter"]
        body: "Je check ca ! [Reset mot de passe ou renvoi du mail d'inscription]"
      mail_avis:
        triggers: ["mail d'avis", "avis", "judge.me"]
        body: "Je vais voir si je peux te le renvoyer. Sinon, on travaille sur une solution pour laisser un avis directement depuis le site !"
      difference_whey:
        triggers: ["difference", "whey isolate", "whey recovery"]
        body: "La Whey Recovery c'est une formule 3-en-1 : whey concentrate + creatine + collagene, pensee pour une recuperation complete (musculaire, articulaire et performance). La Whey Isolate c'est de la proteine pure et plus concentree, ideale si tu veux juste l'apport proteique. Les deux contiennent de la lactase donc pas de souci de digestion !"
      lactose:
        triggers: ["lactose", "intolerant", "digestion"]
        body: "Nos whey contiennent de la lactase, une enzyme qui aide a digerer le lactose, donc pas de souci de digestion !"

