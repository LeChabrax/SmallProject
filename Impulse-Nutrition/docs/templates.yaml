      Merci d'avoir pris le temps de nous repondre ! On comprend tout a fait et l'on te souhaite une tres belle continuation dans tes projets avec ta marque actuelle. Si jamais tu cherches a trouver des complements alimentaires plus axes sur la recuperation et les moments avant et apres l'effort, on pense vraiment qu'Impulse Nutrition pourrait te plaire. On sait qu'il nous manque quelques produits pour la partie effort, mais on y travaille ! En revanche, on a vraiment de super produits pour la recup, donc si ca t'interesse, n'hesite surtout pas, on reste disponibles pour une future collaboration !

