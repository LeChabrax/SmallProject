      Antoine - Impulse Nutrition

  s3_4_communaute_trop_petite:
    id: "s3.4"
    section: "3.4"
    name: "Refus - communaute trop petite + code welcome"
    category: "community_too_small"
    mode: "verbatim"
    needs_signature: true
    variables: [prenom, accroche, CODE25]
    note: "Apres envoi, le prospect est 'parque'. CODE25 = ACHAB25 par defaut."
    sheet_update:
      statut: "Out"
      priorite: "good"
    body: |
      Merci pour ton message {prenom} et pour le partage de ton projet, {accroche} 🔥

      Pour etre transparent avec toi, on travaille avec des profils qui ont une communaute deja bien etablie sur les reseaux, et pour l'instant ton compte ne correspond pas encore aux criteres qu'on recherche pour nos partenariats. Ce n'est absolument pas un jugement sur la qualite de ton contenu ou de ton projet, mais c'est notre critere actuel.

      Ce qu'on peut faire en revanche : je te laisse un code perso {CODE25} pour que tu puisses decouvrir nos produits avec -25% sur ta commande. Et si dans le futur ta communaute se developpe, n'hesite pas a revenir vers nous, ce sera avec plaisir !

      Sportivement,
      Antoine
    example_filled: |
      Merci pour ton message Lucas et pour le partage de ton projet, ta prepa marathon ca a l'air solide 🔥

      Pour etre transparent avec toi, on travaille avec des profils qui ont une communaute deja bien etablie sur les reseaux, et pour l'instant ton compte ne correspond pas encore aux criteres qu'on recherche pour nos partenariats. Ce n'est absolument pas un jugement sur la qualite de ton contenu ou de ton projet, mais c'est notre critere actuel.

      Ce qu'on peut faire en revanche : je te laisse un code perso ACHAB25 pour que tu puisses decouvrir nos produits avec -25% sur ta commande. Et si dans le futur ta communaute se developpe, n'hesite pas a revenir vers nous, ce sera avec plaisir !

      Sportivement,
      Antoine

  # ---------------------------------------------------------------------------
  # S4 — Presentation detaillee du programme
  # ---------------------------------------------------------------------------
  s4_explication_programme:
    id: "s4"
    section: "4"
    name: "Presentation detaillee du programme ambassadeur"
    category: "in_hot_needs_reply"
    mode: "verbatim"
    needs_signature: true
    variables: []
    body: |
      On est ravis !

      Pour t'expliquer plus en details, l'objectif du programme ambassadeur est que tu representes la marque en realisant des posts, stories ou tout autre format de ton choix, afin que ton code d'affiliation soit utilise un maximum. En tant qu'ambassadeur, tu recois un credit de 20€ a utiliser sur Impulse Nutrition a chaque fois qu'une commande est realisee avec ton code. Ca te permet de commander autant de complements alimentaires que necessaire pour ta pratique !

      Par la suite, si tout se passe vraiment bien, on pourra naturellement evoluer vers un partenariat remunere.

      Si tu veux plus d'infos, n'hesite pas. En tout cas, ton profil nous interesse beaucoup et on a des produits sympas a te faire tester !

      Sportivement,
      Antoine

