      Trop bien, on est ravi ! 😄

      Pour tester les produits, est-ce que tu preferes selectionner toi-meme les produits qui t'interessent sur notre site ou qu'on te concocte un pack personnalise ? Dans les deux cas c'est gratuit pour toi ! Il me faudra egalement une adresse (avec nom + prenom), un email et un numero, je te prepare la commande en suivant !

