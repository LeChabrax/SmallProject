    variables: []
    condition: "dernier_message_impulse > 10 jours"
    note: "A prepender au debut du message principal"
    body: "Je suis vraiment desole pour ce temps de reponse, c'est inadmissible de mon cote, c'etait un peu la course !"

  # ---------------------------------------------------------------------------
  # S16 — Relance prospect parque (semi_structured)
  # ---------------------------------------------------------------------------
  s16_relance_parque:
    id: "s16"
    section: "16"
    name: "Relance prospect parque (code welcome detecte)"
    category: "welcome_parque"
    mode: "semi_structured"
    needs_signature: true
    variables: [prenom]
    note: "JAMAIS utiliser s2 dans ce cas. Toujours acknowledger le passe."
    slots:
      accroche:
        description: "Acknowledgment explicite du contexte nouveau du prospect"
        contrainte: "Base sur des faits reels du thread, JAMAIS invente"
        exemples:
          - "Tu as bien grandi depuis notre dernier echange, {stats reelles}"
          - "C'etait sympa d'echanger avec toi sur le stand du salon Run Experience"
          - "Ta prepa pour l'Ultra Marin approche, ca a l'air solide"
          - "Les stats que tu nous as partagees sont tres solides, bravo"
      proposition:
        description: "Offre adaptee au contexte"
        si_justifie: "Ca fait tout a fait sens qu'on reprenne cette discussion maintenant. {offre}"
        si_doute: "Je regarde ca de pres et je reviens vers toi tres vite pour te proposer quelque chose qui ait du sens."
    body: |
      Salut {prenom}, merci de revenir vers nous !

      {accroche}

      {proposition}

      Sportivement,
      Antoine
    example_filled: |
      Salut Maxime, merci de revenir vers nous !

      Tu as bien grandi depuis notre dernier echange, 12k abonnes et un taux d'engagement a 6% c'est vraiment solide, bravo !

      Ca fait tout a fait sens qu'on reprenne cette discussion maintenant. Je te propose qu'on s'appelle pour voir comment on peut bosser ensemble, qu'est-ce que tu en dis ?

      Sportivement,
      Antoine

