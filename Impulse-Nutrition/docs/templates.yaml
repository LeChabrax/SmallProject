    body: |
      Merci d'avoir pris le temps de nous repondre ! On comprend tout a fait et l'on te souhaite une tres belle continuation dans tes projets avec ta marque actuelle. Si jamais tu cherches des complements alimentaires plus axes sur l'effort, et vraiment specialises sur la performance, on pense vraiment qu'Impulse Nutrition pourrait te plaire. Si ca t'interesse, n'hesite surtout pas, on reste disponibles pour une future collaboration !

      Sportivement,
      Antoine - Impulse Nutrition

  s3_3_sponsor_effort_ouverture_recup:
    id: "s3.3"
    section: "3.3"
    name: "Refus - sponsor effort mais ouverture recuperation"
    category: "already_taken_effort_ouverture_recup"
    mode: "verbatim"
    needs_signature: true
    variables: []
