# =============================================================================
# Bibliotheque de templates DM Instagram — Impulse Nutrition
# =============================================================================
#
# Source unique machine-readable des messages a envoyer aux ambassadeurs.
# Reference humaine : docs/dm_decision_tree.md
#
# MODES :
#   verbatim         → Claude copie-colle le body, remplace les {vars} uniquement
#   pick_from_list   → Claude choisit dans la liste, n'invente JAMAIS
#   semi_structured  → Parties fixes verbatim + remplir les slots declares
#
# REGLE D'OR : aucune reformulation en mode verbatim. Le texte dans body:
# est le texte final (variables substituees). Toute divergence = RED FLAG.
# =============================================================================

version: 1
generated_from: "docs/dm_decision_tree.md"
last_updated: "2026-04-16"

# -----------------------------------------------------------------------------
# Regles de tone globales
# -----------------------------------------------------------------------------
personality:
  tutoiement: true
  signature_long: "Sportivement,\nAntoine"
  signature_medium: "Antoine"
  signature_alt: "Antoine - Impulse Nutrition"
  signature_threshold: 3  # nb phrases minimum pour signer
  emoji_max: 2
  emoji_favorites: ["😉", "🔥", "😄", "😊", "😍", "☺️"]
  emoji_banned: ["🙏", "✨", "💖"]
  no_em_dash: true
  no_final_period_micro: true
  double_exclamation_micro: true
  no_hello_active_conv: true
  banned_terms: ["ROI", "KPI", "reach", "conversion", "collab"]
  preferred_terms:
    collab: "partenariat"

# -----------------------------------------------------------------------------
# Variables disponibles (remplies par le skill depuis thread/Sheet/profil)
# -----------------------------------------------------------------------------
variables:
  prenom:
    description: "Prenom (Sheet col AE ou contexte thread)"
    source: "sheet.AE ou thread_user.full_name.split()[0]"
  username:
    description: "Compte Instagram @"
    source: "thread_user.username"
  CODE:
    description: "Code affilie Shopify (ex: FLORINE, ALEXTV)"
    source: "sheet.N (code_affilie) ou Shopify"
  CODE25:
    description: "Code welcome -25% (ACHAB25 par defaut)"
    source: "detection thread ou ACHAB25"
  envelope:
    description: "Montant dotation (80 EUR ou 100 EUR)"
    source: "regle: <20k followers = 80, >=20k = 100"
  credit_value:
    description: "Montant credit disponible en euros"
    source: "(sheet.O - sheet.Q) * 20"
  solde:
    description: "Nombre d'utilisations de credit restantes"
    source: "sheet.O - sheet.Q"
  N:
    description: "Nombre generique (followers, utilisations...)"
    source: "contexte"
  accroche:
    description: "Accroche contextuelle projet/bio"
    source: "extraction manuelle du thread/bio"

# =============================================================================
# TEMPLATES
# =============================================================================
templates:

  # ---------------------------------------------------------------------------
  # S2 — Premier message ambassadeur
  # ---------------------------------------------------------------------------
  s2_pitch_standard:
    id: "s2"
    section: "2"
    name: "Premier message ambassadeur - standard"
    category: "new_prospect_outbound"
    mode: "verbatim"
    needs_signature: true
    variables: [prenom]
    body: |
      Hello {prenom},

      Je suis Antoine d'Impulse Nutrition, une marque de nutrition sportive premium qui developpe des produits fabriques en France de tres grande qualite, penses par et pour les besoins reels des sportifs.

      Nous lancons un programme ambassadeur et recherchons des athletes qui souhaitent tester nos produits. Ton profil nous a semble particulierement coherent, tant pour ton approche du sport que pour la qualite de ton contenu ainsi que credibilite et l'engagement que tu degages.

      Je voulais donc savoir si ca t'interesserait de recevoir des produits a tester, et, s'ils te plaisent, de faire partie de notre programme ambassadeur ? Je peux te donner plus de details si tu veux !

      Sportivement,
      Antoine
    example_filled: |
      Hello Florine,

      Je suis Antoine d'Impulse Nutrition, une marque de nutrition sportive premium qui developpe des produits fabriques en France de tres grande qualite, penses par et pour les besoins reels des sportifs.

      Nous lancons un programme ambassadeur et recherchons des athletes qui souhaitent tester nos produits. Ton profil nous a semble particulierement coherent, tant pour ton approche du sport que pour la qualite de ton contenu ainsi que credibilite et l'engagement que tu degages.

      Je voulais donc savoir si ca t'interesserait de recevoir des produits a tester, et, s'ils te plaisent, de faire partie de notre programme ambassadeur ? Je peux te donner plus de details si tu veux !

      Sportivement,
      Antoine

  s2_pitch_impressionne:
    id: "s2v"
    section: "2"
    name: "Premier message ambassadeur - impressionne par le profil"
    category: "new_prospect_outbound"
    mode: "verbatim"
    needs_signature: true
    variables: [envelope]
    envelope_rules:
      - condition: "followers < 20000"
        value: "80 €"
      - condition: "followers >= 20000"
        value: "100 €"
    body: |
      On est tres impressionnes par ton parcours ! C'est tres inspirant et tu partages vraiment les valeurs du sport et du depassement de soi, donc deja bravo !!

      Travailler avec toi sera un plaisir ! Ce que je te propose :

      Dans un premier temps, on t'envoie pour {envelope} de produits, tu choisis ce que tu preferes ou on te fait un pack, c'est comme tu preferes, dans tous les cas c'est gratuit pour toi !

      Dans un deuxieme temps, si les produits te plaisent, on te cree un code affiliation que tu pourras partager en story avec ta review des produits.

      Et dans un troisieme temps, si ton code affiliation fonctionne bien, on te passera dans le programme ambassadeur et a chaque fois qu'une commande sera passee avec ton code, tu recevras 20 € de credit a utiliser sur notre site, comme ca tu pourras avoir autant de complements que necessaire pour ta pratique !

      Je le redis, encore bravo, ton profil est vraiment impressionnant !

      N'hesite pas si tu as des questions,
      Antoine
    example_filled: |
      On est tres impressionnes par ton parcours ! C'est tres inspirant et tu partages vraiment les valeurs du sport et du depassement de soi, donc deja bravo !!

      Travailler avec toi sera un plaisir ! Ce que je te propose :

      Dans un premier temps, on t'envoie pour 100 € de produits, tu choisis ce que tu preferes ou on te fait un pack, c'est comme tu preferes, dans tous les cas c'est gratuit pour toi !

      Dans un deuxieme temps, si les produits te plaisent, on te cree un code affiliation que tu pourras partager en story avec ta review des produits.

      Et dans un troisieme temps, si ton code affiliation fonctionne bien, on te passera dans le programme ambassadeur et a chaque fois qu'une commande sera passee avec ton code, tu recevras 20 € de credit a utiliser sur notre site, comme ca tu pourras avoir autant de complements que necessaire pour ta pratique !

      Je le redis, encore bravo, ton profil est vraiment impressionnant !

      N'hesite pas si tu as des questions,
      Antoine

  # ---------------------------------------------------------------------------
